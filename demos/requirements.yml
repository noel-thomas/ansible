---
# Collections required by the demos.
# Install with:
#   ansible-galaxy collection install -r requirements.yml
#
# ansible.posix is needed by playbooks/04-user-management.yml
# for the `authorized_key` module. The other demos only use ansible.builtin.

collections:
  - name: ansible.posix
    version: ">=1.5.0"
  - name: community.general
    version: ">=8.0.0"
