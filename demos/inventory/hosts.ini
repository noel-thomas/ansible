# =============================================================================
# Inventory for the Ansible webinar demos
# =============================================================================
#
# This inventory points at localhost so the demos run on the presenter's
# laptop without needing remote servers. To run against real hosts, replace
# the [webservers] group with your actual hostnames or IPs.
#
# Example real inventory:
#
#   [webservers]
#   web1.example.com
#   web2.example.com ansible_user=ubuntu
#
#   [dbservers]
#   db1.example.com
#
#   [production:children]
#   webservers
#   dbservers
# =============================================================================

[local]
localhost ansible_connection=local ansible_python_interpreter=/usr/bin/python3

[webservers]
localhost ansible_connection=local ansible_python_interpreter=/usr/bin/python3

[all:vars]
ansible_user_friendly_name=Webinar Demo
