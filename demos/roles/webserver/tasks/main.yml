---
# Main task list for the `webserver` role.
#
# Responsibility: install a web server, render a templated config and index
# page, and make sure the service is running. Cross-distro: nginx on Debian,
# httpd (Apache) on RHEL family.

- name: Install web server packages
  ansible.builtin.package:
    name: "{{ web_packages }}"
    state: present
  tags: [install]

- name: Ensure document root exists
  ansible.builtin.file:
    path: "{{ site_doc_root }}"
    state: directory
    mode: '0755'
  tags: [config]

- name: Render the web server site config
  ansible.builtin.template:
    src: "{{ web_site_config_template }}"
    dest: "{{ web_site_config_path }}"
    mode: '0644'
    backup: yes
  notify: reload web server
  tags: [config]

- name: Render the landing page
  ansible.builtin.template:
    src: index.html.j2
    dest: "{{ site_doc_root }}/index.html"
    mode: '0644'
  tags: [content]

# Apache can't return an inline body for /health, so we drop a static file.
# On nginx the `location = /health` block shadows the file, so this is safe
# to drop on both distros.
- name: Drop a /health endpoint file
  ansible.builtin.copy:
    dest: "{{ site_doc_root }}/health"
    mode: '0644'
    content: "ok\n"
  tags: [content]

- name: Ensure the web server is running and enabled
  ansible.builtin.service:
    name: "{{ web_service }}"
    state: "{{ nginx_service_state }}"
    enabled: "{{ nginx_service_enabled }}"
  tags: [service]
