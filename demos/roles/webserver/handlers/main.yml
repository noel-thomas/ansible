---
# Handlers for the `webserver` role.
# These only fire when a task `notify:`s them AND that task actually changed.

- name: reload web server
  ansible.builtin.service:
    name: "{{ web_service }}"
    state: reloaded

- name: restart web server
  ansible.builtin.service:
    name: "{{ web_service }}"
    state: restarted
