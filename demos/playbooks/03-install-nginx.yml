---
# =============================================================================
# Demo 2 — Configuration management with a web server
# =============================================================================
# Install a web server, drop a templated config, restart only if the config
# changed. We use nginx on Debian/Ubuntu and httpd (Apache) on RHEL family —
# Ansible lets us paper over the difference with facts + variables.
#
# Run with:
#   ansible-playbook playbooks/03-install-nginx.yml --ask-become-pass
#
# After it runs:
#   curl http://localhost/health   # should print "ok"
#
# Run it a SECOND time to see idempotency in action — changed=0.
# =============================================================================

- name: "Demo 2 — Install and configure a web server"
  hosts: webservers
  become: yes

  vars:
    nginx_listen_port: 80

    web_package_by_family:
      Debian: nginx
      RedHat: httpd

    web_service_by_family:
      Debian: nginx
      RedHat: httpd

    web_config_path_by_family:
      Debian: /etc/nginx/sites-available/default
      RedHat: /etc/httpd/conf.d/default.conf

    web_config_template_by_family:
      Debian: ../templates/nginx-custom.conf.j2
      RedHat: ../templates/httpd-custom.conf.j2

    web_package: "{{ web_package_by_family[ansible_facts['os_family']] }}"
    web_service: "{{ web_service_by_family[ansible_facts['os_family']] }}"

  tasks:

    # ---------------------------------------------------------------------
    # 1. Install — works on Debian/Ubuntu *and* RHEL/Fedora/Rocky/CentOS
    # ---------------------------------------------------------------------
    - name: Install web server (Debian/Ubuntu)
      ansible.builtin.apt:
        name: "{{ web_package }}"
        state: present
        update_cache: yes
      when: ansible_facts['os_family'] == 'Debian'

    - name: Install web server (RHEL/Fedora/Rocky/CentOS)
      ansible.builtin.dnf:
        name: "{{ web_package }}"
        state: present
      when: ansible_facts['os_family'] == 'RedHat'

    # ---------------------------------------------------------------------
    # 2. Configure — drop a Jinja2-rendered config
    # ---------------------------------------------------------------------
    - name: Ensure web root exists
      ansible.builtin.file:
        path: /var/www/html
        state: directory
        mode: '0755'

    - name: Deploy custom web server site config
      ansible.builtin.template:
        src: "{{ web_config_template_by_family[ansible_facts['os_family']] }}"
        dest: "{{ web_config_path_by_family[ansible_facts['os_family']] }}"
        mode: '0644'
        backup: yes
      notify: reload web server

    # On Apache we serve /health as a static file (Apache can't return inline
    # response bodies the way nginx can). On nginx this file is shadowed by the
    # `location = /health` block, so it's harmless to drop on both.
    - name: Drop a /health endpoint file
      ansible.builtin.copy:
        dest: /var/www/html/health
        mode: '0644'
        content: "ok\n"

    - name: Drop a minimal index.html
      ansible.builtin.copy:
        dest: /var/www/html/index.html
        mode: '0644'
        content: |
          <!doctype html>
          <html><head><title>{{ webinar_title }}</title></head>
          <body style="font-family: sans-serif; padding: 2em;">
            <h1>Hello from Ansible!</h1>
            <p>Served by {{ inventory_hostname }} ({{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}).</p>
          </body></html>

    # ---------------------------------------------------------------------
    # 3. Run — start the service
    # ---------------------------------------------------------------------
    - name: Make sure the web server is started and enabled at boot
      ansible.builtin.service:
        name: "{{ web_service }}"
        state: started
        enabled: yes

  # =====================================================================
  # Handlers run at the end of the play, but ONLY if a task notified them.
  # =====================================================================
  handlers:

    - name: reload web server
      ansible.builtin.service:
        name: "{{ web_service }}"
        state: reloaded
